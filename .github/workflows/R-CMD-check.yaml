# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  # Nightly slow/engine tier (MOSAIC_RUN_SLOW_TESTS=1) and manual dispatch.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true


      - name: Install system deps on Linux (SSL, PROJ, GDAL)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libudunits2-dev \
            libproj-dev \
            libgeos-dev \
            libgdal-dev \
            python3-dev

      - name: Install system deps on macOS (SSL + UDUNITS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew update
          brew install \
            openssl@3 \
            udunits

          # Tell R where to find OpenSSL & UDUNITS at compile time
          export PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig:\
          $(brew --prefix udunits)/lib/pkgconfig:$PKG_CONFIG_PATH"
          export LDFLAGS="-L$(brew --prefix openssl@3)/lib \
          -L$(brew --prefix udunits)/lib $LDFLAGS"
          export CPPFLAGS="-I$(brew --prefix openssl@3)/include \
          -I$(brew --prefix udunits)/include $CPPFLAGS"


      - name: Install Python 3.12 (arm64) on macOS
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install python@3.12
          # ensure this python comes first
          echo "$(brew --prefix python@3.12)/bin" >> $GITHUB_PATH
          # tell reticulate to use it
          echo "RETICULATE_PYTHON=$(brew --prefix python@3.12)/bin/python3" >> $GITHUB_ENV

      - name: Set up Miniforge (Conda)
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-activate-base: false
          miniforge-version: "latest"

      - name: Install laser-cholera engine for reticulate (enables engine-backed tests)
        # Without the engine, setup-python.R's probe leaves
        # mosaic.test.has_likelihood = FALSE, so skip_if_no_python_likelihood()
        # ALWAYS skips the engine-backed parity tests in CI -- including the
        # Dask loc_idx + as_ndarray-dtype parity guards and the R<->Python
        # calc_model_likelihood parity suite (the only automated guard for the
        # Dask scoring path). A dedicated venv sidesteps PEP-668 externally-
        # managed errors and unifies the interpreter across macOS/ubuntu; we
        # override RETICULATE_PYTHON so reticulate uses it. Pin matches
        # inst/python/environment.yml (laser-cholera v0.16.0 / laser-core 1.0.1).
        # TensorFlow is intentionally omitted (keras tests stay self-skipped).
        run: |
          python3 -m venv "$HOME/r-mosaic-venv"
          "$HOME/r-mosaic-venv/bin/python" -m pip install --upgrade pip
          "$HOME/r-mosaic-venv/bin/python" -m pip install "numpy<2" pyarrow "laser-core==1.0.1" \
            "https://github.com/InstituteforDiseaseModeling/laser-cholera/releases/download/v0.16.0/laser_cholera-0.16.0-py3-none-any.whl"
          "$HOME/r-mosaic-venv/bin/python" -c "import laser.cholera.calc_model_likelihood, laser.cholera.metapop.model; print('laser-cholera engine import OK')"
          echo "RETICULATE_PYTHON=$HOME/r-mosaic-venv/bin/python" >> "$GITHUB_ENV"


      - name: Install R package dependencies
        run: |
          Rscript -e 'if (!requireNamespace("remotes", quietly=TRUE)) install.packages("remotes")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, upgrade = "never")'

      - name: Build source tarball
        run: R CMD build . --no-manual

      - name: Install MOSAIC from tarball
        run: R CMD INSTALL MOSAIC_*.tar.gz

      - name: Smoke-load MOSAIC
        run: Rscript -e 'library(MOSAIC)'

      # Default PR / push runs the FAST tier SERIALLY. The slow prior-derivation
      # tests gate on MOSAIC_RUN_SLOW_TESTS (unset here); engine/keras/integration
      # tests stay gated on their own env vars. We force TESTTHAT_PARALLEL=FALSE
      # here so the inner-parallel tests (mclapply fork / PSOCK cluster) actually
      # run -- they self-skip under Config/testthat/parallel (local dev speedup)
      # to avoid nesting parallel-over-parallel, so CI must run serial to cover
      # them. ~2 min serial is acceptable; local `devtools::test()` stays parallel.
      - name: Run testthat (fast tier, serial -> full coverage)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          TESTTHAT_PARALLEL: 'FALSE'
        run: Rscript -e 'testthat::test_local(stop_on_failure = TRUE)'

      # Nightly schedule / manual dispatch runs the SLOW tier in addition to the
      # fast tier (engine/keras still require the worker image and stay gated).
      - name: Run testthat (slow tier, serial)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          MOSAIC_RUN_SLOW_TESTS: '1'
          TESTTHAT_PARALLEL: 'FALSE'
        run: Rscript -e 'testthat::test_local(stop_on_failure = TRUE)'


      - name: Install MOSAIC from GitHub
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'remotes::install_github(repo = Sys.getenv("GITHUB_REPOSITORY"), dependencies = TRUE)'
          Rscript -e 'library(MOSAIC)'


      - name: Install MOSAIC Python deps
        if: runner.os != 'macOS'
        run: Rscript -e 'MOSAIC::install_dependencies(force=TRUE)'

      - name: Check MOSAIC Python deps
        run: Rscript -e 'MOSAIC::check_dependencies()'
